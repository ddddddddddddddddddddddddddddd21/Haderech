<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>הדרך שלי</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --bg:        transparent;
  --surface:   rgba(255,255,255,0.045);
  --surface2:  rgba(255,255,255,0.07);
  --surface3:  rgba(255,255,255,0.10);
  --border:    rgba(100,200,255,0.09);
  --border2:   rgba(100,200,255,0.15);
  --text-1:    rgba(255,255,255,0.96);
  --text-2:    rgba(160,220,255,0.58);
  --text-3:    rgba(160,220,255,0.44);
  --blue:      #50BEFF;
  --blue-dim:  rgba(80,190,255,0.13);
  --blue-b:    rgba(80,190,255,0.25);
  --green:     #3CDCAA;
  --green-dim: rgba(60,220,170,0.13);
  --amber:     #FFD60A;
  --amber-dim: rgba(255,214,10,0.13);
  --red:       #FF7070;
  --red-dim:   rgba(255,112,112,0.13);
  --radius:    12px;
  --radius-lg: 16px;
  --tr:        0.18s ease;
}

html {
  background: linear-gradient(160deg, #0E1822 0%, #080F1A 55%, #050C16 100%);
  min-height: 100%;
}
html::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background:
    radial-gradient(ellipse 55% 35% at 80% 5%,  rgba(80,200,255,0.10) 0%, transparent 100%),
    radial-gradient(ellipse 40% 30% at 10% 85%, rgba(40,140,255,0.07) 0%, transparent 100%);
}

body {
  font-family: 'Heebo', sans-serif;
  background: transparent;
  color: var(--text-1);
  min-height: 100vh;
  max-width: 430px;
  margin: 0 auto;
  -webkit-font-smoothing: antialiased;
  position: relative;
  z-index: 1;
}

.screen { display:none; flex-direction:column; min-height:100vh; }
.screen.active { display:flex; }

/* TOPBAR */
.topbar {
  display:flex; align-items:center; justify-content:space-between;
  padding:18px 20px 12px;
  position:sticky; top:0; z-index:20;
  background: rgba(8,15,26,0.5);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(100,200,255,0.06);
}
.topbar-title { font-size:13px; font-weight:600; color:var(--text-2); }
.icon-btn {
  min-width:44px; min-height:44px; display:flex; align-items:center; justify-content:center;
  border:none; background:none; cursor:pointer; color:var(--text-2);
  font-size:20px; border-radius:var(--radius); transition:background var(--tr);
}
.icon-btn:active { background:var(--surface2); }

/* BODY */
.body { flex:1; overflow-y:auto; padding:0 20px 100px; }

/* PROGRESS STRIP */
.progress-strip { margin-bottom:28px; }
.progress-bars { display:flex; gap:5px; margin-bottom:6px; }
.p-bar { flex:1; height:3px; border-radius:2px; background:var(--surface3); cursor:pointer; transition:background var(--tr); }
.p-bar.today   { background:var(--blue); }
.p-bar.done    { background:var(--green); }
.p-bar.partial { background:var(--amber); }
.p-bar.missed  { background:var(--red); }
.progress-labels { display:flex; gap:5px; }
.p-label { flex:1; text-align:center; font-size:12px; font-weight:600; color:var(--text-3); transition:color var(--tr); }
.p-label.today   { color:var(--blue); }
.p-label.done    { color:var(--green); }
.p-label.partial { color:var(--amber); }
.p-label.missed  { color:var(--red); }

.week-chip { font-size:11px; font-weight:600; color:var(--text-3); letter-spacing:0.5px; text-transform:uppercase; margin-bottom:10px; display:block; }
.principle-name { font-size:28px; font-weight:800; color:var(--text-1); line-height:1.1; letter-spacing:-0.4px; margin-bottom:6px; }
.principle-desc { font-size:13px; font-weight:300; color:var(--text-2); line-height:1.75; margin-bottom:20px; }

/* TASK CARD */
.task-item {
  display:flex; align-items:flex-start; gap:14px;
  padding:16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  margin-bottom: 20px;
}
.task-circle {
  width:20px; height:20px; border-radius:50%; flex-shrink:0;
  border:1.5px solid var(--blue); margin-top:2px;
}
.task-text { font-size:15px; font-weight:400; color:var(--text-1); line-height:1.6; }

/* STATUS */
.status-section { padding-top:4px; }
.status-label { font-size:11px; font-weight:600; color:var(--text-3); letter-spacing:0.5px; text-transform:uppercase; margin-bottom:10px; }
.status-row { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:20px; }
.stn {
  min-height:46px; border-radius:var(--radius);
  border:1px solid var(--border2); background:var(--surface);
  font-family:'Heebo',sans-serif; font-size:13px; font-weight:500;
  color:var(--text-2); cursor:pointer; transition:all var(--tr);
}
.stn:active { transform:scale(0.96); }
.stn.s-done    { border-color:rgba(60,220,170,0.4);  background:var(--green-dim); color:var(--green); }
.stn.s-partial { border-color:rgba(255,214,10,0.35); background:var(--amber-dim); color:var(--amber); }
.stn.s-missed  { border-color:rgba(255,112,112,0.35); background:var(--red-dim);  color:var(--red); }

/* NOTE */
.note-item {
  display:flex; align-items:flex-start; gap:12px;
  padding:14px 16px;
  background: var(--surface); border:1px solid var(--border);
  border-radius:var(--radius-lg); margin-bottom:20px;
}
.note-icon { font-size:14px; color:var(--text-3); margin-top:2px; flex-shrink:0; width:20px; text-align:center; }
textarea {
  flex:1; border:none; outline:none; resize:none; background:transparent;
  font-family:'Heebo',sans-serif; font-size:14px; color:var(--text-1);
  line-height:1.6; caret-color:var(--blue); padding:0;
}
textarea::placeholder { color:var(--text-3); }

/* BUTTONS */
.btn {
  width:100%; min-height:50px; border-radius:var(--radius-lg);
  font-family:'Heebo',sans-serif; font-size:15px; font-weight:600;
  cursor:pointer; transition:opacity var(--tr), transform 0.1s; border:none;
}
.btn-blue {
  background: rgba(80,190,255,0.14);
  border: 1px solid rgba(80,190,255,0.28);
  color: rgba(160,220,255,0.95);
}
.btn-blue:active { opacity:0.75; transform:scale(0.99); }
.btn-ghost {
  background:var(--surface2); color:var(--text-2);
  border:1px solid var(--border2);
}
.btn-ghost:active { opacity:0.7; }

/* REVIEW ENTRY */
.review-entry {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 16px; border-radius:var(--radius-lg);
  background:var(--surface); border:1px solid var(--border);
  margin-top:12px; cursor:pointer; transition:opacity var(--tr);
}
.review-entry:active { opacity:0.6; }
.re-text { font-size:14px; font-weight:500; color:var(--text-1); }
.re-sub  { font-size:12px; color:var(--text-3); margin-top:2px; }
.re-arrow { font-size:16px; color:var(--blue); }

.divider { height:1px; background:var(--border); margin:20px 0; }

/* NAV */
.nav {
  position:fixed; bottom:0; left:50%; transform:translateX(-50%);
  width:100%; max-width:430px;
  background: rgba(5,12,22,0.82);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-top:1px solid rgba(100,200,255,0.08);
  display:flex; padding:10px 0 28px; z-index:30;
}
.nb {
  flex:1; min-height:44px; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:3px;
  border:none; background:none; cursor:pointer; font-family:'Heebo',sans-serif;
}
.nb-dot { width:4px; height:4px; border-radius:50%; background:transparent; transition:background var(--tr); }
.nb-label { font-size:12px; color:var(--text-3); transition:color var(--tr); }
.nb.active .nb-dot  { background:var(--blue); }
.nb.active .nb-label { color:var(--text-1); font-weight:600; }

/* TOAST */
.toast {
  position:fixed; bottom:100px; left:50%; transform:translateX(-50%);
  background:rgba(80,190,255,0.15); border:1px solid rgba(80,190,255,0.25);
  backdrop-filter:blur(20px); color:rgba(160,220,255,0.95);
  padding:10px 22px; border-radius:20px; font-size:13px; font-weight:500;
  opacity:0; pointer-events:none; z-index:99; white-space:nowrap; transition:opacity 0.2s;
}
.toast.show { opacity:1; }

/* SPLASH */
#splash {
  position:fixed; inset:0; z-index:100;
  background: linear-gradient(160deg, #0E1822 0%, #080F1A 55%, #050C16 100%);
  display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer;
}
#splash::before {
  content:''; position:absolute; inset:0; pointer-events:none;
  background:
    radial-gradient(ellipse 55% 35% at 80% 5%,  rgba(80,200,255,0.10) 0%, transparent 100%),
    radial-gradient(ellipse 40% 30% at 10% 85%, rgba(40,140,255,0.07) 0%, transparent 100%);
}
.splash-icon {
  width:80px; height:80px; border-radius:24px;
  background: rgba(80,190,255,0.15);
  border: 1px solid rgba(80,190,255,0.3);
  backdrop-filter: blur(20px);
  display:flex; align-items:center; justify-content:center;
  margin-bottom:24px; opacity:0;
  animation:fadeUp 0.5s ease 0.2s forwards;
  position:relative; z-index:1;
}
.splash-name {
  font-size:28px; font-weight:800; color:rgba(255,255,255,0.95);
  letter-spacing:-0.4px; opacity:0;
  animation:fadeUp 0.5s ease 0.4s forwards;
  position:relative; z-index:1;
}
.splash-tap {
  font-size:11px; color:rgba(160,220,255,0.38); letter-spacing:0.8px;
  text-transform:uppercase; margin-top:52px; opacity:0;
  animation:fadeUp 0.4s ease 0.7s forwards, pulse 2.5s ease 1.5s infinite;
  position:relative; z-index:1;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }
@keyframes pulse  { 0%,100%{opacity:.2;} 50%{opacity:.55;} }

/* VALUE PICKER */
#s-picker { background:transparent; }
.picker-wrap { flex:1; display:flex; flex-direction:column; padding:36px 22px 100px; overflow-y:auto; }
.picker-title { font-size:26px; font-weight:800; color:var(--text-1); letter-spacing:-0.4px; margin-bottom:8px; }
.picker-sub   { font-size:13px; color:var(--text-2); font-weight:300; line-height:1.75; margin-bottom:8px; }
.picker-count { font-size:11px; color:var(--blue); font-weight:700; letter-spacing:0.5px; margin-bottom:24px; }

.value-grid { display:flex; flex-direction:column; gap:8px; margin-bottom:28px; }
.value-card {
  display:flex; align-items:center; gap:14px;
  padding:14px 16px; border-radius:var(--radius-lg);
  border:1px solid var(--border); background:var(--surface);
  cursor:pointer; transition:all var(--tr);
}
.value-card:active { transform:scale(0.98); }
.value-card.selected { border-color:rgba(80,190,255,0.4); background:var(--blue-dim); }
.value-card.disabled { opacity:0.3; cursor:default; pointer-events:none; }
.value-card-check {
  width:22px; height:22px; border-radius:50%; flex-shrink:0;
  border:1.5px solid var(--border2);
  display:flex; align-items:center; justify-content:center;
  font-size:12px; color:transparent; transition:all var(--tr);
}
.value-card.selected .value-card-check { background:var(--blue); border-color:var(--blue); color:#fff; }
.value-card-info { flex:1; }
.value-card-name { font-size:15px; font-weight:600; color:var(--text-1); margin-bottom:3px; }
.value-card.selected .value-card-name { color:var(--blue); }
.value-card-desc { font-size:12px; color:var(--text-3); font-weight:300; line-height:1.5; }

/* WEEK OPEN */
.wo-wrap { flex:1; display:flex; flex-direction:column; padding:52px 22px 40px; }
.wo-chip { font-size:11px; font-weight:600; color:var(--text-3); letter-spacing:0.6px; text-transform:uppercase; margin-bottom:14px; }
.wo-name { font-size:34px; font-weight:800; line-height:1.05; letter-spacing:-0.5px; color:var(--text-1); margin-bottom:14px; }
.wo-desc { font-size:15px; color:var(--text-2); line-height:1.8; font-weight:300; flex:1; margin-bottom:32px; }

/* REVIEW */
.rp-wrap { margin-bottom:20px; }
.rp-label { font-size:11px; font-weight:600; color:var(--text-3); letter-spacing:0.5px; text-transform:uppercase; margin-bottom:8px; }
.rp-name  { font-size:24px; font-weight:800; letter-spacing:-0.4px; color:var(--text-1); margin-bottom:6px; }
.rp-desc  { font-size:13px; color:var(--text-2); line-height:1.75; font-weight:300; }
.rday { padding:12px 0; border-bottom:1px solid var(--border); }
.rday:last-child { border-bottom:none; }
.rday-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:5px; }
.rday-date { font-size:12px; color:var(--text-3); }
.pill { font-size:10px; font-weight:700; padding:3px 9px; border-radius:7px; flex-shrink:0; }
.pill.done    { background:var(--green-dim); color:var(--green); }
.pill.partial { background:var(--amber-dim); color:var(--amber); }
.pill.missed  { background:var(--red-dim);   color:var(--red); }
.pill.empty   { background:var(--surface2);  color:var(--text-3); }
.rday-task { font-size:13px; color:var(--text-1); line-height:1.55; margin-bottom:3px; }
.rday-note { font-size:12px; color:var(--text-2); line-height:1.55; font-weight:300; }
.note-field {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius-lg); margin-bottom:8px; overflow:hidden;
}
.note-field-label {
  font-size:10px; font-weight:700; color:var(--text-3); letter-spacing:0.5px;
  text-transform:uppercase; padding:12px 16px 0; display:block;
}
.note-field textarea { display:block; width:100%; padding:8px 16px 13px; flex:none; }

/* CYCLE */
.cw { display:flex; align-items:center; gap:14px; padding:14px 0; border-bottom:1px solid var(--border); cursor:pointer; transition:opacity var(--tr); }
.cw:last-child { border-bottom:none; }
.cw:active { opacity:0.6; }
.cw-num {
  width:36px; height:36px; border-radius:var(--radius); flex-shrink:0;
  background:var(--blue-dim); border:1px solid var(--blue-b);
  display:flex; align-items:center; justify-content:center;
  font-size:13px; font-weight:700; color:var(--blue);
}
.cw-info { flex:1; }
.cw-name  { font-size:14px; font-weight:500; color:var(--text-1); }
.cw-stats { font-size:12px; color:var(--text-3); margin-top:2px; }
.cw-bar   { height:2px; background:var(--surface3); border-radius:2px; margin-top:8px; overflow:hidden; }
.cw-fill  { height:100%; background:var(--blue); border-radius:2px; }

/* HISTORY */
.hc {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius-lg); margin-bottom:8px; overflow:hidden;
}
.hc-head { display:flex; justify-content:space-between; align-items:center; padding:14px 16px; cursor:pointer; min-height:44px; }
.hc-title { font-size:14px; font-weight:600; color:var(--text-1); }
.hc-sub   { font-size:12px; color:var(--text-3); margin-top:2px; }
.hc-chevron { font-size:12px; color:var(--text-3); transition:transform var(--tr); }
.hc-chevron.open { transform:rotate(180deg); }
.hc-body  { display:none; border-top:1px solid var(--border); }
.hc-body.open { display:block; }
.hw {
  display:flex; align-items:center; justify-content:space-between;
  padding:11px 16px; border-bottom:1px solid var(--border);
  cursor:pointer; min-height:44px;
}
.hw:last-child { border-bottom:none; }
.hw-name { font-size:13px; color:var(--text-2); }
.hw-dots { display:flex; gap:3px; width:120px; }
.md { flex:1; height:26px; border-radius:5px; }
.md.done    { background:var(--green); opacity:0.85; }
.md.partial { background:var(--amber); opacity:0.85; }
.md.missed  { background:var(--red);   opacity:0.85; }
.md.empty   { background:var(--surface3); }

.back-btn {
  display:flex; align-items:center; gap:5px; border:none; background:none;
  cursor:pointer; color:var(--blue); font-family:'Heebo',sans-serif;
  font-size:14px; font-weight:500; padding:0; min-height:44px;
}
.empty { text-align:center; padding:64px 20px; color:var(--text-3); font-size:14px; line-height:1.8; }
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash" onclick="dismissSplash()">
  <div class="splash-icon">
    <svg width="44" height="44" viewBox="0 0 44 44" fill="none">
      <circle cx="12" cy="34" r="4.5" stroke="rgba(160,220,255,0.8)" stroke-width="2.5" fill="none"/>
      <circle cx="32" cy="12" r="4.5" fill="rgba(160,220,255,0.95)"/>
      <path d="M12 34 C12 22 32 22 32 12" stroke="rgba(160,220,255,0.9)" stroke-width="3" stroke-linecap="round" fill="none"/>
    </svg>
  </div>
  <div class="splash-name">הדרך שלי</div>
  <div class="splash-tap">לחץ להמשיך</div>
</div>

<div class="toast" id="toast"></div>

<!-- VALUE PICKER -->
<div class="screen" id="s-picker">
  <div class="picker-wrap">
    <div class="picker-title">בחר את הערכים שלך</div>
    <div class="picker-sub">בחר עד 6 ערכים שתרצה לעבוד עליהם. הסדר שתבחר הוא סדר השבועות.</div>
    <div class="picker-count" id="picker-count">0 / 6 נבחרו</div>
    <div class="value-grid" id="value-grid"></div>
    <button class="btn btn-blue" id="picker-confirm" onclick="confirmValues()" style="opacity:0.4;pointer-events:none">התחל מסע</button>
    <div style="height:12px"></div>
  </div>
</div>

<!-- HOME -->
<div class="screen" id="s-home">
  <div class="topbar">
    <div class="topbar-title" id="h-week-label"></div>
    <button class="icon-btn" onclick="nav('history')" aria-label="היסטוריה">☰</button>
  </div>
  <div class="body">
    <div id="h-date" style="font-size:13px;color:var(--text-3);font-weight:400;margin-bottom:18px;padding-top:18px;"></div>
    <div class="progress-strip" id="h-strip"></div>
    <div class="week-chip" id="h-principle-label"></div>
    <div class="principle-name" id="h-principle"></div>
    <div class="principle-desc" id="h-desc"></div>
    <div class="task-item">
      <div class="task-circle"></div>
      <div class="task-body">
        <div class="task-text" id="h-task"></div>
      </div>
    </div>
    <div class="status-section">
      <div class="status-label">איך הלך?</div>
      <div class="status-row">
        <button class="stn" id="b-done"    onclick="setStatus('done')"   >עשיתי</button>
        <button class="stn" id="b-partial" onclick="setStatus('partial')">חלקית</button>
        <button class="stn" id="b-missed"  onclick="setStatus('missed')" >לא יצא</button>
      </div>
    </div>
    <div class="note-item">
      <div class="note-icon">✎</div>
      <textarea id="h-note" rows="2" placeholder="הערה קצרה..."></textarea>
    </div>
    <button class="btn btn-blue" onclick="saveDay()">שמור</button>
    <div class="review-entry" id="h-review-link" style="display:none" onclick="nav('review')">
      <div>
        <div class="re-text">סקירה שבועית</div>
        <div class="re-sub">סיים את השבוע</div>
      </div>
      <span class="re-arrow">←</span>
    </div>
  </div>
</div>

<!-- WEEK OPEN -->
<div class="screen" id="s-week-open">
  <div class="wo-wrap">
    <div class="wo-chip"  id="wo-label"></div>
    <div class="wo-name"  id="wo-name"></div>
    <div class="wo-desc"  id="wo-desc"></div>
    <button class="btn btn-blue" onclick="startWeek()">התחל שבוע</button>
  </div>
</div>

<!-- REVIEW -->
<div class="screen" id="s-review">
  <div class="topbar">
    <button class="back-btn" onclick="navBack()"><span id="r-back-label">← חזור</span></button>
    <div style="font-size:14px;font-weight:600;color:var(--text-2)" id="r-screen-title">סקירה שבועית</div>
    <div style="width:60px"></div>
  </div>
  <div class="body">
    <div class="rp-wrap">
      <div class="rp-label">העיקרון השבוע</div>
      <div class="rp-name" id="r-name"></div>
      <div class="rp-desc" id="r-desc"></div>
    </div>
    <div id="r-days"></div>
    <div class="divider"></div>
    <div class="note-field"><span class="note-field-label">מה עבד לי השבוע?</span><textarea id="r-q1" rows="2" placeholder="כתוב כאן..."></textarea></div>
    <div class="note-field"><span class="note-field-label">מה היה לי קשה?</span><textarea id="r-q2" rows="2" placeholder="כתוב כאן..."></textarea></div>

const SL = { done:'עשיתי', partial:'חלקית', missed:'לא יצא', '':'—' };

function defaultState() { return { values:null, wi:0, di:0, started:false, logs:[[]], reviews:[], history:[], ci:0 }; }
function loadState() { try { const s=localStorage.getItem('haderech_v3'); if(s) return JSON.parse(s); } catch(e){} return defaultState(); }
function saveState() { try { localStorage.setItem('haderech_v3', JSON.stringify(st)); } catch(e) { console.warn('שמירה נכשלה', e); } }
let st = loadState();

// History view state
let _histView = null; // { values, logs, reviews } of a past cycle
let _histViewWi = 0;

function navBack() {
  if(_histView){ _histView=null; _histViewWi=0; nav('history'); }
  else nav('home');
}

function ensureLogs() {
  while(st.logs.length<=st.wi) st.logs.push([]);
  while(st.logs[st.wi].length<=st.di) st.logs[st.wi].push({status:'',note:'',ts:''});
}
function todayStr() { return new Date().toLocaleDateString('he-IL',{weekday:'long',day:'numeric',month:'long'}); }
function wk() { return st.values[st.wi]; }
function log(i) { ensureLogs(); return st.logs[st.wi][i==null?st.di:i]; }

function toast(msg) {
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('s-'+id).classList.add('active');
  document.getElementById('main-nav').style.display=['week-open','picker'].includes(id)?'none':'flex';
}
function setNav(id) {
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  const el=document.getElementById('n-'+id); if(el) el.classList.add('active');
}
function dismissSplash() {
  const s=document.getElementById('splash'); if(!s) return;
  s.style.transition='opacity 0.3s ease'; s.style.opacity='0';
  setTimeout(()=>{ s.remove(); afterSplash(); },320);
}
function afterSplash() { if(!st.values){renderPicker();showScreen('picker');}else{nav('home');} }

let pickerSelected=[]; let allPickerValues=[...PRESET_VALUES];
function renderPicker() { pickerSelected=[]; allPickerValues=[...PRESET_VALUES]; buildPickerGrid(); }
function buildPickerGrid() {
  const grid=document.getElementById('value-grid'); grid.innerHTML='';
  allPickerValues.forEach(v=>{
    const isSelected=pickerSelected.some(s=>s.name===v.name);
    const isDisabled=!isSelected&&pickerSelected.length>=MAX_WEEKS;
    const card=document.createElement('div');
    card.className='value-card'+(isSelected?' selected':'')+(isDisabled?' disabled':'');
    card.innerHTML=`<div class="value-card-check">${isSelected?'✓':''}</div><div class="value-card-info"><div class="value-card-name">${v.name}</div>${v.desc?`<div class="value-card-desc">${v.desc}</div>`:''}</div>`;
    card.onclick=()=>toggleValue(v); grid.appendChild(card);
  }); updatePickerCount();
}
function toggleValue(v) {
  const idx=pickerSelected.findIndex(s=>s.name===v.name);
  if(idx>=0) pickerSelected.splice(idx,1); else { if(pickerSelected.length>=MAX_WEEKS) return; pickerSelected.push(v); }
  buildPickerGrid();
}
function updatePickerCount() {
  const n=pickerSelected.length; document.getElementById('picker-count').textContent=`${n} / ${MAX_WEEKS} נבחרו`;
  const btn=document.getElementById('picker-confirm');
  btn.style.opacity=n>=1?'1':'0.4'; btn.style.pointerEvents=n>=1?'auto':'none';
}
function confirmValues() {
  if(!pickerSelected.length) return;
  st.values=pickerSelected.map(v=>({...v})); st.wi=0; st.di=0; st.started=false; st.logs=[]; st.reviews=[];
  saveState(); renderWO(); showScreen('week-open');
}

function nav(id) {
  // reset note dirty flag when navigating away from home
  if(id!=='home'){ const n=document.getElementById('h-note'); if(n) n._dirty=false; }
  if(id==='home') { if(!st.values){renderPicker();showScreen('picker');return;} if(!st.started){renderWO();showScreen('week-open');return;} renderHome();showScreen('home');setNav('home');return; }
  if(id==='review')  {
    if(!st.values||!st.started){toast('התחל שבוע קודם');return;}
    _histView=null; renderReview(null); showScreen('review'); setNav('review'); return;
  }
  if(id==='cycle')   {
    if(!st.values){toast('עוד לא התחלת מסע');return;}
    renderCycle();  showScreen('cycle');  setNav('cycle');  return;
  }
  if(id==='history') {renderHistory();showScreen('history');setNav('history');return;}
}

function renderHome() {
  // Fix 2: check if we need to advance the day (app left open overnight)
  if(st.started&&st.values){
    ensureLogs();
    const cur=log();
    if(cur.status&&cur.ts&&cur.ts!==todayStr()&&st.di<DAYS-1){
      st.di++;ensureLogs();if(!log().ts)log().ts=todayStr();saveState();
    }
  }
  ensureLogs(); const d=log();
  if(!d.ts){d.ts=todayStr();saveState();}
  const totalWeeks=st.values.length;
  document.getElementById('h-date').textContent=new Date().toLocaleDateString('he-IL',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  document.getElementById('h-week-label').textContent=`שבוע ${st.wi+1} מתוך ${totalWeeks}  ·  יום ${st.di+1}`;
  document.getElementById('h-principle-label').textContent='עיקרון השבוע';
  document.getElementById('h-principle').textContent=wk().name;
  document.getElementById('h-desc').textContent=wk().desc||'';
  document.getElementById('h-task').textContent=getTask(st.wi,st.di);
  // Fix 1: only restore note from storage if textarea is empty or matches saved value
  // (prevents overwriting text user is currently typing when clicking status)
  const noteEl=document.getElementById('h-note');
  if(!noteEl._dirty) noteEl.value=d.note||'';
  ['done','partial','missed'].forEach(s=>{ document.getElementById('b-'+s).className='stn'+(d.status===s?' s-'+s:''); });
  renderStrip();
  const wd=st.logs[st.wi]||[];
  const allDone=wd.length>=DAYS&&wd.slice(0,DAYS).every(entry=>entry&&entry.status);
  document.getElementById('h-review-link').style.display=(allDone||(st.di>=DAYS-1&&log().status))?'flex':'none';
}
function getTask(wi,di) { const v=st.values[wi]; if(v&&v.tasks&&v.tasks[di]) return v.tasks[di]; return getAutoTask(v?v.name:'',di); }
function getAutoTask(n,i) { return [`זהה הזדמנות אחת להפגין ${n} היום ועשה אותה`,`שאל מישהו: איפה לדעתך ${n} שלי בא לידי ביטוי?`,`בצע פעולה קטנה אחת שמחזקת את ${n} שלך`,`עצור דקה ושאל את עצמך: איך ${n} מתבטא בהתנהגות שלי היום?`,`סכם ביום: מה עשיתי היום שקשור ל${n}?`][i%5]; }

function renderStrip() {
  const wrap=document.getElementById('h-strip');
  const bars=document.createElement('div'); bars.className='progress-bars';
  const lbls=document.createElement('div'); lbls.className='progress-labels';
  for(let i=0;i<DAYS;i++){
    const s=(st.logs[st.wi]&&st.logs[st.wi][i]?st.logs[st.wi][i].status:'');
    const cls=i===st.di?(s||'today'):s||'';
    const bar=document.createElement('div'); bar.className='p-bar'+(cls?' '+cls:''); bar.onclick=()=>jumpDay(i); bars.appendChild(bar);
    const lbl=document.createElement('div'); lbl.className='p-label'+(cls?' '+cls:''); lbl.textContent=i+1; lbls.appendChild(lbl);
  }
  wrap.innerHTML=''; wrap.appendChild(bars); wrap.appendChild(lbls);
}
function jumpDay(i) {
  if(i>st.di){toast('שמור את היום הנוכחי קודם');return;}
  // save current note before jumping away
  ensureLogs();
  log().note=document.getElementById('h-note').value.trim();
  saveState();
  document.getElementById('h-note')._dirty=false;
  st.di=i;saveState();renderHome();
}
function setStatus(s) { ensureLogs(); log().status=s; renderHome(); }
function saveDay() {
  ensureLogs(); const d=log();
  d.note=document.getElementById('h-note').value.trim();
  if(!d.status){toast('בחר סטטוס קודם');return;}
  if(!d.ts) d.ts=todayStr();
  document.getElementById('h-note')._dirty=false;
  saveState(); toast('נשמר ✓'); renderHome();
}

function renderWO() {
  document.getElementById('wo-label').textContent=`שבוע ${st.wi+1} מתוך ${st.values?st.values.length:'?'}`;
  document.getElementById('wo-name').textContent=wk().name;
  document.getElementById('wo-desc').textContent=wk().desc||'';
}
function startWeek() {
  st.started=true; ensureLogs(); if(!log().ts) log().ts=todayStr();
  saveState(); renderHome(); showScreen('home'); setNav('home');
  // reset dirty flag for fresh week
  const n=document.getElementById('h-note'); if(n) n._dirty=false;
}

function renderReview(hist) {
  const h    = hist || st;
  const wi   = hist ? _histViewWi : st.wi;
  const v    = h.values[wi];
  const isRO = !!hist;

  document.getElementById('r-name').textContent = v.name;
  document.getElementById('r-desc').textContent = v.desc || '';
  document.getElementById('r-back-label').textContent   = isRO ? '← חזור להיסטוריה' : '← חזור';
  document.getElementById('r-screen-title').textContent = isRO ? 'צפייה בסקירה' : 'סקירה שבועית';
  document.getElementById('r-save-btn').style.display   = isRO ? 'none' : 'block';

  const list=document.getElementById('r-days'); list.innerHTML='';
  for(let i=0;i<DAYS;i++){
    const d=(h.logs[wi]||[])[i]||{status:'',note:'',ts:''};
    const task = v.tasks&&v.tasks[i] ? v.tasks[i] : getAutoTask(v.name,i);
    const el=document.createElement('div'); el.className='rday';
    el.innerHTML=`<div class="rday-header"><span class="rday-date">${d.ts||`יום ${i+1}`}</span><span class="pill ${d.status||'empty'}">${SL[d.status||'']}</span></div><div class="rday-task">${task}</div>${d.note?`<div class="rday-note">${d.note}</div>`:''}`;
    list.appendChild(el);
  }

  const rev=(h.reviews||[])[wi]||{};
  document.getElementById('r-q1').value    = rev.q1||'';
  document.getElementById('r-q2').value    = rev.q2||'';
  document.getElementById('r-q3').value    = rev.q3||'';
  ['r-q1','r-q2','r-q3'].forEach(id=>{
    const el=document.getElementById(id);
    el.readOnly=isRO;
    el.style.opacity=isRO?'0.55':'1';
  });
}
function saveReview() {
  st.reviews[st.wi]={q1:document.getElementById('r-q1').value.trim(),q2:document.getElementById('r-q2').value.trim(),q3:document.getElementById('r-q3').value.trim()};
  saveState();
  if(st.wi<st.values.length-1){st.wi++;st.di=0;st.started=false;saveState();toast('מוכן לשבוע הבא');renderWO();showScreen('week-open');}
  else{toast('סיימת את המחזור!');setTimeout(()=>{renderCycle();showScreen('cycle');setNav('cycle');},700);}
}

function renderCycle() {
  const el=document.getElementById('c-weeks'); el.innerHTML='';
  st.values.forEach((v,w)=>{
    const days=st.logs[w]||[]; const done=days.filter(d=>d&&d.status==='done').length; const part=days.filter(d=>d&&d.status==='partial').length;
    const pct=Math.round(((done+part*0.5)/DAYS)*100);
    const row=document.createElement('div'); row.className='cw';
    row.innerHTML=`<div class="cw-num">${w+1}</div><div class="cw-info"><div class="cw-name">${v.name}</div><div class="cw-stats">${done}/${DAYS} ימים · ${pct}%</div><div class="cw-bar"><div class="cw-fill" style="width:${pct}%"></div></div></div>`;
    row.onclick=()=>{st.wi=w;st.started=true;renderReview();showScreen('review');setNav('review');}; el.appendChild(row);
  });
}
function startNewCycle() {
  st.history.push({ci:st.ci,values:JSON.parse(JSON.stringify(st.values)),logs:JSON.parse(JSON.stringify(st.logs)),reviews:JSON.parse(JSON.stringify(st.reviews)),date:new Date().toLocaleDateString('he-IL')});
  st.ci++; st.values=null; st.wi=0; st.di=0; st.started=false; st.logs=[]; st.reviews=[]; saveState(); renderPicker(); showScreen('picker');
}

function resetAll() {
  if(!confirm('למחוק את כל הנתונים ולהתחיל מחדש?')) return;
  localStorage.removeItem('haderech_v3');
  location.reload();
}
function renderHistory() {
  const el=document.getElementById('history-body');
  const all=[...st.history].reverse();
  const hasCur=st.values&&st.logs.some(w=>w.length>0);
  if(!hasCur&&all.length===0){
    el.innerHTML=`<div class="empty">עדיין אין היסטוריה</div>`;
    el.innerHTML+=`<div style="text-align:center;padding-bottom:20px"><button onclick="resetAll()" style="background:none;border:none;font-family:'Heebo',sans-serif;font-size:12px;color:rgba(255,112,112,0.4);cursor:pointer;padding:12px 20px">איפוס מלא</button></div>`;
    return;
  }
  el.innerHTML='';
  if(hasCur||st.started) el.appendChild(buildCycleBlock(`מחזור ${st.ci+1} — נוכחי`,`שבוע ${st.wi+1}`,st.values,st.logs,true,-1));
  all.forEach((h,displayIdx)=>{
    const origIdx=st.history.length-1-displayIdx;
    el.appendChild(buildCycleBlock(`מחזור ${h.ci+1}`,`הסתיים ${h.date}`,h.values,h.logs,false,origIdx));
  });
  const reset=document.createElement('div');
  reset.style.cssText='text-align:center;padding:8px 0 20px';
  reset.innerHTML=`<button onclick="resetAll()" style="background:none;border:none;font-family:'Heebo',sans-serif;font-size:12px;color:rgba(255,112,112,0.4);cursor:pointer;padding:12px 20px;letter-spacing:0.3px">איפוס מלא</button>`;
  el.appendChild(reset);
}
function buildCycleBlock(title,sub,values,logs,open,histIdx) {
  const div=document.createElement('div'); div.className='hc';
  if(!values){div.innerHTML=`<div style="padding:14px 16px;font-size:13px;color:var(--text-3)">${title}</div>`;return div;}
  const isCurrent = histIdx===-1;
  const body=values.map((v,i)=>{
    const days=logs[i]||[]; const dots=Array.from({length:DAYS},(_,d)=>`<div class="md ${(days[d]||{status:''}).status||'empty'}"></div>`).join('');
    const click=isCurrent?`histWeek(${i})`:`histViewWeek(${histIdx},${i})`;
    return `<div class="hw" onclick="${click}"><span class="hw-name">שבוע ${i+1}: ${v.name}</span><div class="hw-dots">${dots}</div></div>`;
  }).join('');
  div.innerHTML=`<div class="hc-head" onclick="toggleAccordion(this)"><div><div class="hc-title">${title}</div><div class="hc-sub">${sub}</div></div><span class="hc-chevron${open?' open':''}">▾</span></div><div class="hc-body${open?' open':''}">${body}</div>`;
  return div;
}
function toggleAccordion(head) { const body=head.nextElementSibling; const chev=head.querySelector('.hc-chevron'); body.classList.toggle('open'); chev.classList.toggle('open'); }
function histWeek(wi) {
  _histView=null; st.wi=wi; st.started=true;
  renderReview(null); showScreen('review'); setNav('review');
}
function histViewWeek(histIdx, wi) {
  _histView=st.history[histIdx]; _histViewWi=wi;
  renderReview(_histView); showScreen('review'); setNav('review');
}

(function init() {
  if(!st.logs||!Array.isArray(st.logs)){st=defaultState();saveState();}
  if(st.started&&st.values){
    ensureLogs(); const cur=log();
    if(cur.status&&cur.ts&&cur.ts!==todayStr()&&st.di<DAYS-1){st.di++;ensureLogs();if(!log().ts)log().ts=todayStr();saveState();}
  }
  // track when user is typing so renderHome won't overwrite their note
  document.addEventListener('DOMContentLoaded',()=>{
    const n=document.getElementById('h-note');
    if(n) n.addEventListener('input',()=>{ n._dirty=true; });
  });
  // also wire immediately in case DOM is already ready
  const n=document.getElementById('h-note');
  if(n) n.addEventListener('input',()=>{ n._dirty=true; });
})();
</script>
</body>
</html>
